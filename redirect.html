<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Перенаправление...</title>
    <script>
        const params = new URLSearchParams(window.location.search);
        const app = params.get('app');
        const url = params.get('url');
        if (app === 'happ' && url) {
            window.location.href = 'happ://add/' + decodeURIComponent(url);
        } else if (app === 'v2raytun' && url) {
            window.location.href = 'v2raytun://install-sub?url=' + encodeURIComponent(decodeURIComponent(url));
        } else {
            document.body.innerText = 'Ошибка: неверные параметры';
        }
    </script>
</head>
<body>
    <p>Перенаправление в приложение...</p>
</body>
</html>
