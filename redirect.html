<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Перенаправление...</title>
</head>
<body>
    <script>
        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const app = urlParams.get('app');      // happ или v2raytun
        const subUrl = urlParams.get('url');   // ссылка на подписку

        if (app && subUrl) {
            // Формируем нужную схему
            const redirectUrl = `${app}://add/${subUrl}`;
            // Перенаправляем
            window.location.href = redirectUrl;
        } else {
            document.body.innerHTML = '<p>Ошибка: не указаны параметры app или url</p>';
        }
    </script>
</body>
</html>
