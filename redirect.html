<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Перенаправление в приложение...</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 2rem; background: #f0f2f5; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { color: #1f5e2c; }
        p { margin: 1rem 0; color: #2c3e50; }
        .spinner { width: 40px; height: 40px; margin: 1rem auto; border: 4px solid #e0e0e0; border-top-color: #1f5e2c; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #d32f2f; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔄 Перенаправление</h2>
    <div class="spinner"></div>
    <p>Пожалуйста, подождите...</p>
    <p class="error" id="errorMsg"></p>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const app = urlParams.get('app');      // 'happ' или 'v2raytun'
    const url = urlParams.get('url');      // полный URL подписки (закодированный)
    
    if (!app || !url) {
        document.getElementById('errorMsg').innerText = 'Ошибка: не указано приложение или ссылка.';
        document.querySelector('.spinner').style.display = 'none';
        return;
    }
    
    let scheme = '';
    if (app === 'happ') {
        scheme = 'happ://add/';
    } else if (app === 'v2raytun') {
        scheme = 'v2raytun://install-sub?url=';
    } else {
        document.getElementById('errorMsg').innerText = 'Неизвестное приложение.';
        document.querySelector('.spinner').style.display = 'none';
        return;
    }
    
    const fullUrl = scheme + decodeURIComponent(url);
    // Перенаправляем через 500 мс (чтобы страница успела показать спиннер)
    setTimeout(() => {
        window.location.href = fullUrl;
    }, 500);
    
    // На случай, если редирект не сработал (например, приложение не установлено)
    setTimeout(() => {
        const msg = document.getElementById('errorMsg');
        if (msg.innerText === '') {
            msg.innerHTML = '⚠️ Приложение не найдено. Установите Happ или v2rayTun и повторите попытку.<br><br>'
                + (app === 'happ' 
                    ? '<a href="https://citer1852-lab.github.io/SHUR-SUB/" target="_blank">👉 Инструкция по установке</a>'
                    : '<a href="https://citer1852-lab.github.io/SHUR-SUB/" target="_blank">👉 Инструкция по установке</a>');
            document.querySelector('.spinner').style.display = 'none';
        }
    }, 2000);
</script>
</body>
</html>
