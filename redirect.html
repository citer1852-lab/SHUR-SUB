<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Перенаправление в приложение</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { margin: 0 0 8px; color: #1e293b; }
        p { color: #475569; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 500;
            margin-top: 8px;
        }
        .btn:active { background: #2563eb; }
        .error { color: #dc2626; margin-top: 16px; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="card" id="content">
    <div class="loader"></div>
    <h2>Перенаправление в приложение</h2>
    <p>Если ничего не происходит, нажмите кнопку ниже.</p>
    <a href="#" id="manualLink" class="btn">Открыть в приложении</a>
    <div id="errorMsg" class="error"></div>
</div>

<script>
    // Получаем параметры из URL
    const urlParams = new URLSearchParams(window.location.search);
    const app = urlParams.get('app');      // 'happ' или 'v2raytun'
    let targetUrl = urlParams.get('url'); // закодированный URL подписки (например, https://shur-sub.../?token=...)
    const routingData = urlParams.get('data'); // <-- новое

    if (targetUrl) {
        targetUrl = decodeURIComponent(targetUrl);
    }

    let redirectUri = null;

    if (routingData) {
    // Маршрутизация
        if (app === 'happ') {
            redirectUri = `happ://routing/add/${routingData}`;
        } // v2raytun для маршрутизации пока не поддерживаем
    } else if (targetUrl) {
    // Обычная подписка
        const decodedUrl = decodeURIComponent(targetUrl);
        if (app === 'happ') {
            redirectUri = `happ://add/${decodedUrl}`;
        } else if (app === 'v2raytun') {
            redirectUri = `v2raytun://install-sub?url=${encodeURIComponent(decodedUrl)}`;
        }
    }

    if (app === 'happ' && targetUrl) {
        redirectUri = `happ://add/${targetUrl}`;
    } else if (app === 'v2raytun' && targetUrl) {
        redirectUri = `v2raytun://install-sub?url=${encodeURIComponent(targetUrl)}`;
    }

    // Элементы
    const manualLink = document.getElementById('manualLink');
    const errorMsg = document.getElementById('errorMsg');

    if (redirectUri) {
        // Пробуем перенаправить автоматически
        window.location.href = redirectUri;
        manualLink.href = redirectUri;

        // Если через 3 секунды не произошло перехода (возможно, приложение не установлено) – показываем подсказку
        setTimeout(() => {
            errorMsg.textContent = 'Приложение не установлено? Установите Happ или v2rayTun и нажмите кнопку выше.';
        }, 3000);
    } else {
        document.querySelector('.loader').style.display = 'none';
        errorMsg.textContent = 'Неверные параметры ссылки. Пожалуйста, вернитесь в бот и попробуйте снова.';
        manualLink.style.display = 'none';
    }
</script>
</body>
</html>
