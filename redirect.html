<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Перенаправление...</title>
</head>
<body>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const app = urlParams.get('app');
        let subUrl = urlParams.get('url');
        if (app && subUrl) {
            subUrl = decodeURIComponent(subUrl);
            let redirectUrl;
            if (app === 'happ') {
                redirectUrl = 'happ://add/' + subUrl;
            } else if (app === 'v2raytun') {
                redirectUrl = 'v2raytun://install-sub?url=' + encodeURIComponent(subUrl);
            } else {
                redirectUrl = null;
            }
            if (redirectUrl) {
                window.location.href = redirectUrl;
            } else {
                document.body.innerHTML = '<p>Ошибка: неизвестное приложение</p>';
            }
        } else {
            document.body.innerHTML = '<p>Ошибка: не указаны параметры app или url</p>';
        }
    </script>
</body>
</html>
